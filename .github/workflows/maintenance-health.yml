name: Check knowledge maintenance health

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Check committed maintenance state
        run: |
          python scripts/check_maintenance_health.py \
            --github-summary \
            --fail-on overdue
