name: Check knowledge maintenance health

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Check committed maintenance state
        run: |
          python scripts/check_maintenance_health.py \
            --github-summary \
            --fail-on overdue
