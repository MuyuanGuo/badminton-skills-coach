name: Package and attest release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/validate.yml

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Package archive and generate SBOM
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE="dist/liuhui-badminton-coach-${VERSION}.zip"
          python scripts/package_skill_release.py --version "$VERSION" --output-dir dist
          python scripts/generate_release_sbom.py \
            --archive "$ARCHIVE" \
            --version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --output dist/SBOM.cdx.json \
            --checksum-file dist/SHA256SUMS.txt

      - name: Attest archive and SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: dist/liuhui-badminton-coach-*.zip
          sbom-path: dist/SBOM.cdx.json

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Badminton Skills Coach $RELEASE_TAG"
          fi
