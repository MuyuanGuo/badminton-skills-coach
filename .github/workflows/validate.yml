name: Validate knowledge pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  static-and-unit:
    name: Static and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m compileall -q scripts skills/liuhui-badminton-coach/scripts

      - name: Run fast tests
        run: python scripts/run_ci_tests.py fast

  core-evaluations:
    name: Core evaluations (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: quality-report
            kind: evaluations
            shard_index: 0
          - name: answer-context-1
            kind: context
            shard_index: 0
          - name: answer-context-2
            kind: context
            shard_index: 1
          - name: answer-context-3
            kind: context
            shard_index: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Collect core evaluations once
        if: matrix.kind == 'evaluations'
        run: python scripts/collect_evaluation_results.py --output "$RUNNER_TEMP/core-evaluations.json"

      - name: Check deterministic evaluation report
        if: matrix.kind == 'evaluations'
        run: python scripts/generate_evaluation_report.py --check --evaluations "$RUNNER_TEMP/core-evaluations.json"

      - name: Evaluate feedback signals
        if: matrix.kind == 'evaluations'
        run: python scripts/evaluate_feedback_signals.py

      - name: Validate compact answer packets
        if: matrix.kind == 'evaluations'
        run: python scripts/evaluate_answer_packet.py

      - name: Run answer-context regression shard
        if: matrix.kind == 'context'
        run: >-
          python scripts/run_ci_tests.py context
          --shard-index ${{ matrix.shard_index }}
          --shard-count 3

  artifact-validation:
    name: Artifact validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Run artifact tests
        run: python scripts/run_ci_tests.py artifacts

      - name: Check generated manifest
        run: python scripts/build_manifest.py --check

      - name: Check committed video links
        run: python scripts/check_video_links.py

      - name: Run DOM regression tests
        run: |
          node scripts/test_douyin_profile_snapshot_dom.mjs
          node scripts/test_douyin_video_media_assets_dom.mjs
          node scripts/test_export_douyin_cookies_cdp.mjs

      - name: Validate repository artifacts
        run: python scripts/validate_project.py

  validate:
    name: validate
    if: always()
    needs:
      - static-and-unit
      - core-evaluations
      - artifact-validation
    runs-on: ubuntu-latest
    steps:
      - name: Require every validation group to pass
        env:
          STATIC_RESULT: ${{ needs.static-and-unit.result }}
          CORE_RESULT: ${{ needs.core-evaluations.result }}
          ARTIFACT_RESULT: ${{ needs.artifact-validation.result }}
        run: |
          for result in "$STATIC_RESULT" "$CORE_RESULT" "$ARTIFACT_RESULT"; do
            case "$result" in
              success|skipped) ;;
              *) echo "Validation dependency finished with: $result" >&2; exit 1 ;;
            esac
          done
