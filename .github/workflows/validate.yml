name: Validate knowledge pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: |
          python -m py_compile \
            scripts/apply_visual_review_notes.py \
            scripts/apply_answer_quality_review_notes.py \
            scripts/batch_transcribe_directory.py \
            scripts/build_answer_quality_review_queue.py \
            scripts/build_manifest.py \
            scripts/build_douyin_knowledge.py \
            scripts/build_retrieval_index.py \
            scripts/build_topic_index.py \
            scripts/build_visual_review_queue.py \
            scripts/check_douyin_updates.py \
            scripts/check_video_links.py \
            scripts/douyin_pipeline.py \
            scripts/doctor.py \
            scripts/evaluate_answer_policy.py \
            scripts/evaluate_answer_context.py \
            scripts/evaluate_answer_quality.py \
            scripts/evaluate_feedback_signals.py \
            scripts/evaluate_query_understanding.py \
            scripts/evaluate_retrieval.py \
            scripts/evaluate_video_comprehension.py \
            scripts/generate_knowledge_graph.py \
            scripts/init_douyin_queue.py \
            scripts/install_skill.py \
            scripts/media_assets.py \
            scripts/monitor_douyin_updates.py \
            scripts/package_skill_release.py \
            scripts/prepare_douyin_media_batch.py \
            scripts/project_artifacts.py \
            scripts/reclassify_douyin_catalog.py \
            scripts/promote_feedback.py \
            scripts/process_douyin_ready_batch.py \
            scripts/report_pipeline_status.py \
            scripts/run_full_update_pipeline.py \
            scripts/test_douyin_pipeline.py \
            scripts/test_douyin_snapshot_validation.py \
            scripts/test_douyin_transactions.py \
            scripts/test_douyin_update_state.py \
            scripts/test_doctor.py \
            scripts/test_answer_context.py \
            scripts/test_build_reproducibility.py \
            scripts/test_classification_migration.py \
            scripts/test_answer_quality.py \
            scripts/test_feedback_pipeline.py \
            scripts/test_feedback_personalization.py \
            scripts/test_feedback_promotion.py \
            scripts/test_knowledge_quality.py \
            scripts/test_knowledge_graph_html.py \
            scripts/test_media_assets.py \
            scripts/test_project_artifacts.py \
            scripts/test_public_feedback_e2e.py \
            scripts/test_query_understanding.py \
            scripts/test_release_package.py \
            scripts/test_repository_links.py \
            scripts/test_search_knowledge.py \
            scripts/test_skill_portability.py \
            scripts/test_transcription_recovery.py \
            scripts/test_topic_navigation.py \
            scripts/test_visual_review_workflow.py \
            scripts/test_video_comprehension.py \
            scripts/transcribe_video.py \
            scripts/update_readme_status.py \
            skills/liuhui-badminton-coach/scripts/navigate_topics.py \
            skills/liuhui-badminton-coach/scripts/feedback.py \
            skills/liuhui-badminton-coach/scripts/doctor.py \
            skills/liuhui-badminton-coach/scripts/install.py \
            skills/liuhui-badminton-coach/scripts/prepare_answer_context.py \
            skills/liuhui-badminton-coach/scripts/search_knowledge.py

      - name: Run regression tests
        run: |
          python scripts/test_douyin_pipeline.py
          python scripts/test_douyin_snapshot_validation.py
          python scripts/test_douyin_transactions.py
          python scripts/test_douyin_update_state.py
          python scripts/test_doctor.py
          python scripts/test_answer_context.py
          python scripts/test_build_reproducibility.py
          python scripts/test_classification_migration.py
          python scripts/test_answer_quality.py
          python scripts/test_feedback_pipeline.py
          python scripts/test_feedback_personalization.py
          python scripts/test_feedback_promotion.py
          python scripts/test_knowledge_quality.py
          python scripts/test_knowledge_graph_html.py
          python scripts/test_media_assets.py
          python scripts/test_project_artifacts.py
          python scripts/test_public_feedback_e2e.py
          python scripts/test_query_understanding.py
          python scripts/test_release_package.py
          python scripts/test_repository_links.py
          python scripts/test_search_knowledge.py
          python scripts/test_skill_portability.py
          python scripts/test_transcription_recovery.py
          python scripts/test_topic_navigation.py
          python scripts/test_visual_review_workflow.py
          python scripts/test_video_comprehension.py
          python scripts/evaluate_answer_policy.py
          python scripts/evaluate_answer_context.py
          python scripts/evaluate_answer_quality.py
          python scripts/evaluate_feedback_signals.py
          python scripts/evaluate_query_understanding.py
          python scripts/evaluate_retrieval.py
          python scripts/evaluate_video_comprehension.py
          python scripts/build_manifest.py --check
          python scripts/check_video_links.py
          node scripts/test_douyin_profile_snapshot_dom.mjs

      - name: Validate repository artifacts
        run: python scripts/validate_project.py

      - name: Enforce stable-release quality gate
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || startsWith(github.ref, 'refs/tags/')
        run: |
          python scripts/evaluate_answer_policy.py \
            --cases data/evaluation/answer_quality_cases.json
          python scripts/evaluate_answer_context.py
          python scripts/evaluate_query_understanding.py
          python scripts/evaluate_video_comprehension.py
          python scripts/evaluate_answer_quality.py \
            --answers data/evaluation/answer_quality_answers.json \
            --min-approved 30 \
            --min-answer-snapshots 10
          python scripts/evaluate_feedback_signals.py
          python scripts/build_manifest.py --check
