name: Validate knowledge pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: |
          python -m py_compile \
            scripts/evaluate_liuhui_skill.py \
            scripts/evaluate_answer_quality.py \
            scripts/apply_visual_review_notes.py \
            scripts/build_douyin_knowledge.py \
            scripts/build_topic_index.py \
            scripts/build_visual_review_queue.py \
            scripts/generate_knowledge_graph.py \
            scripts/generate_pilot_drawio.py \
            scripts/select_pilot_videos.py \
            skills/liuhui-badminton-coach/scripts/navigate_topics.py \
            skills/liuhui-badminton-coach/scripts/search_knowledge.py

      - name: Validate repository artifacts
        run: python scripts/validate_project.py

      - name: Run retrieval evaluation
        run: python scripts/evaluate_liuhui_skill.py

      - name: Run golden answer evaluation
        run: python scripts/evaluate_answer_quality.py
