name: 功能建议
description: 建议新的 Skill 能力、数据来源、维护工具或项目改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议。请说明要解决的问题和实际使用场景，不要提交私人视频、完整聊天记录、联系方式或凭证。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 当前什么事情难以完成，或者哪类用户需求尚未覆盖？
      placeholder: 当我……时，目前需要……，因此很难……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为、入口或输出；不必提供完整技术实现。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的方法
      description: 可选。说明目前的替代做法以及为什么不够好。

  - type: dropdown
    id: area
    attributes:
      label: 涉及范围
      options:
        - Skill 回答与提问体验
        - 视频证据与知识库
        - 检索、评测与反馈
        - 安装、发布与文档
        - 数据更新与维护工具
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue 和 Discussions，没有找到相同建议。
          required: true
        - label: 我确认以上内容可以公开，且不包含私人媒体、凭证或敏感信息。
          required: true
