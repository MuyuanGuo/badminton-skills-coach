name: Bug 报告
description: 报告 Skill、检索、知识库或更新流水线中的可复现问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交问题。请不要粘贴 Token、Cookie、私人视频、完整聊天记录或本地反馈文件。

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简洁说明发生了什么。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 运行……
        2. 输入……
        3. 看到……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 可以提供经过脱敏的错误信息或日志片段。
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: v1.3.0-dev.1、v1.2.1 或提交哈希
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 运行环境
      placeholder: macOS 15 / Python 3.12 / Codex

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我确认以上内容不包含凭证、私人媒体、完整聊天记录或其他敏感信息。
          required: true
